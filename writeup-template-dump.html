    <style>
        /* Add this CSS directly in the head section */
        #writeups {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .blurry-box {
            width: 100%; /* Adjust as needed */
            max-width: 1200px; /* Adjust as needed */
            padding: 20px;
            background-color: rgba(62, 62, 62, 0.6); /* Semi-transparent white background */
            backdrop-filter: blur(10px); /* Blur effect */
            border-radius: 10px; /* Rounded corners */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5); /* Optional: Add a shadow for depth */
        }

        .blurry-box h2 {
            margin-top: 0;
            font-size: 2em;
            color: #ecff1b;
        }

        .blurry-box p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #ffffff;
        }

        .blurry-box img {
            max-width: 100%;
            border-radius: 5px;
            margin: 10px 0;
        }

        /* Console-like box styling */
        .console-box {
            background-color: #2d2d2d;
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;
        }

        .console-header {
            background-color: #4d4d4d;
            padding: 10px;
            display: flex;
            align-items: center;
        }

        .console-header span {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .console-header span.red {
            background-color: #ff5f56;
        }

        .console-header span.yellow {
            background-color: #ffbd2e;
        }

        .console-header span.green {
            background-color: #27c93f;
        }

        .console-body {
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            overflow-x: auto;
            text-align: left; /* Align text to the left */
        }

        .console-body pre {
            margin: 0;
        }

        .console-body code {
            display: block;
            white-space: pre-wrap;
        }
    </style>
</head>
