    <script src="../js/util.js"></script>
    <script src="../js/noise.min.js"></script> 
    <script src="../js/swirl.js"></script>
    <script>
        document.documentElement.className = "js";
        var supportsCssVars = function() {
            var e, t = document.createElement("style");
            return t.innerHTML = "root: { --tmp-var: bold; }", document.head.appendChild(t), e = !!(window.CSS && window.CSS.supports && window.CSS.supports("font-weight", "var(--tmp-var)")), t.parentNode.removeChild(t), e
        };
        supportsCssVars() || alert("Please view this demo in a modern browser that supports CSS Variables.");

        // Typing animation
        const texts = [
            "Notes",
            "Read my detailed notes on various topics."
        ];
        const typedTitleElement = document.getElementById('typed-title');
        const typedDescriptionElement = document.getElementById('typed-description');
        let i = 0;
        let j = 0;
        let currentElement = typedTitleElement;

        function type() {
            if (i < texts[j].length) {
                currentElement.innerHTML += texts[j].charAt(i);
                i++;
                setTimeout(type, 100); // Adjust the typing speed here
            } else {
                if (j < texts.length - 1) {
                    j++;
                    i = 0;
                    currentElement = typedDescriptionElement;
                    type();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', type);
    </script>
