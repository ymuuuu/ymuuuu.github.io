<!DOCTYPE html>

<head>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --blur-strength: 2px;
            --blur-bg-color: rgba(0, 0, 0, 0.5);
            --blur-padding: 1rem;
            --blur-max-width: 70rem;
            --blur-border-radius: 1px;
            --blur-gap: 3rem;
            --blur-text-color: #ffffff;
            --blur-link-color: #ecff1b;
            --blur-link-hover-color: #ffffff;
        }

        .hidden {
            display: none;
        }

        .blurry-box {
            background: var(--blur-bg-color);
            backdrop-filter: blur(var(--blur-strength));
            border-radius: var(--blur-border-radius);
            padding: var(--blur-padding);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--blur-gap);
            margin: 2rem auto;
            max-width: var(--blur-max-width);
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(0); /* Force hardware acceleration */
            width: 100%;
            box-sizing: border-box;
            will-change: transform; /* Hint to the browser */
        }

        .blurry-box img {
            width: 20rem;
            height: 20rem;
            border-radius: 50%;
            border: 3px solid #ffffff;
        }

        .blurry-box .bio {
            max-width: 20rem;
            color: var(--blur-link-color);
        }

        .blurry-box .bio h2 {
            font-size: 2.5em;
            margin-bottom: 1rem;
        }

        .blurry-box .bio p {
            font-size: 1.5em;
            line-height: 1.5;
            letter-spacing: .02rem;
            color: var(--blur-text-color);
        }

        .blurry-box .bio .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1rem;
            margin-left: 1rem;
        }

        .blurry-box .bio .social-links a {
            margin-right: 1rem;
            color: var(--blur-link-color);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .blurry-box .bio .social-links a:hover {
            color: var(--blur-link-hover-color);
        }

        @media (max-width: 700px) {
            .blurry-box {
                flex-direction: column;
                padding: 4rem;
            }

            .blurry-box .bio {
                max-width: 100%;
            }
        }

        canvas {
            transform: translateZ(0); /* Force hardware acceleration */
            will-change: transform; /* Hint to the browser */
        }
    </style>
</head>
<body>
    <header>

        <!-- Blurry Box with Bio and Social Links -->

            <img src="images/video.gif" alt="Your Avatar">

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script src="js/swirl.js"></script>
    <script>
        document.documentElement.className = "js";
        var supportsCssVars = function() {
            var e, t = document.createElement("style");
            return t.innerHTML = "root: { --tmp-var: bold; }", document.head.appendChild(t), e = !!(window.CSS && window.CSS.supports && window.CSS.supports("font-weight", "var(--tmp-var)")), t.parentNode.removeChild(t), e
        };
        supportsCssVars() || alert("Please view this demo in a modern browser that supports CSS Variables.");

        // Typing animation for the bio
        const bioTexts = [
            "Moamen Yasser Musleh",
            "A noob computer guy on the internet who hates computers"
        ];
        const bioHeadingElement = document.getElementById('bio-heading');
        const bioTextElement = document.getElementById('bio-text');
        let bioI = 0;
        let bioJ = 0;
        let bioCurrentElement = bioHeadingElement;

        function typeBio() {
            if (bioI < bioTexts[bioJ].length) {
                bioCurrentElement.innerHTML += bioTexts[bioJ].charAt(bioI);
                bioI++;
                setTimeout(typeBio, 50); // Adjust the typing speed here
            } else {
                if (bioJ < bioTexts.length - 1) {
                    bioJ++;
                    bioI = 0;
                    bioCurrentElement = bioTextElement;
                    typeBio();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', typeBio);
    </script>
