    <script>
        document.documentElement.className = "js";
        var supportsCssVars = function() {
            var e, t = document.createElement("style");
            return t.innerHTML = "root: { --tmp-var: bold; }", document.head.appendChild(t), e = !!(window.CSS && window.CSS.supports && window.CSS.supports("font-weight", "var(--tmp-var)")), t.parentNode.removeChild(t), e
        };
        supportsCssVars() || alert("Please view this demo in a modern browser that supports CSS Variables.");

        // Typing animation
        const texts = [
            "require(fs).readFileSync('/flag.txt', 'utf8');",
            "Click here to execute"
        ];
        const typedTextElement = document.getElementById('typed-text');
        const executeTextElement = document.getElementById('execute-text');
        let i = 0;
        let j = 0;
        let currentElement = typedTextElement;

        function type() {
            if (i < texts[j].length) {
                currentElement.innerHTML += texts[j].charAt(i);
                i++;
                setTimeout(type, 50); // Adjust the typing speed here
            } else {
                if (j < texts.length - 1) {
                    j++;
                    i = 0;
                    currentElement = executeTextElement;
                    type();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', type);

        // Show encoded text on click
        executeTextElement.addEventListener('click', function(event) {
            event.preventDefault();
            document.getElementById('encoded-text').classList.remove('hidden');
        });
    </script>
